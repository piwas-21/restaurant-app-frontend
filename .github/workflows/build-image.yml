name: build-image

# Builds and pushes the Next.js container image to GHCR. The single-box
# Docker Compose deploy pulls ghcr.io/piwas-21/restaurant-app-frontend.
# See workspace docs/plans/HETZNER-MIGRATION-PLAN.md and deploy/.
#
# NEXT_PUBLIC_* are baked into the bundle at BUILD time (Next.js), so they
# are passed as build-args here, not runtime env. These are public values
# (already shipped in client JS / the public gitops repo), not secrets.
#
# Security: no untrusted-input expressions in any run: step; all third-party
# actions pinned to immutable SHAs; token is the workflow-scoped
# GITHUB_TOKEN with packages:write only.

on:
  push:
    branches: [main, develop]   # develop builds are a dry-run; :latest only on the default branch (main)
    tags: ['v*']

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

# Default read-only; packages:write is granted per-job below (least privilege
# at the job level — Sonar S8233).
permissions:
  contents: read

jobs:
  build-push:
    name: build & push (GHCR)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: buildmeta
        # ISO-8601 UTC build timestamp, baked into the image alongside the commit
        # SHA. github.sha is the trusted 40-hex commit; both are safe (no untrusted
        # PR-controlled input) per this workflow's security note.
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=tag

      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://www.rumirestaurant.ch
            NEXT_PUBLIC_IMAGE_BASE_URL=https://www.rumirestaurant.ch
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=102252528656-3quqh29v8b7psntuo04r7duambcs1i0t.apps.googleusercontent.com
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.buildmeta.outputs.time }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Staging image. Same Dockerfile, but NEXT_PUBLIC_* are baked for the STAGING host
  # so the bundle calls the staging backend instead of prod. Runs only on `develop`
  # (staging tracks develop; prod's :latest is built by build-push above, unaffected).
  # Publishes :staging (moving) + :staging-<sha> (immutable, for rollback). The
  # staging URL is a repo variable (STAGING_PUBLIC_URL) so it can be swapped for a
  # brand domain later without editing this file; it falls back to the box's own
  # Netcup hostname. These are public build-time values, not secrets (same as prod).
  build-staging:
    name: build & push staging (GHCR)
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: buildmeta
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-,format=long

      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.STAGING_PUBLIC_URL || 'https://v2202607374190477434.megasrv.de' }}
            NEXT_PUBLIC_IMAGE_BASE_URL=${{ vars.STAGING_PUBLIC_URL || 'https://v2202607374190477434.megasrv.de' }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=102252528656-3quqh29v8b7psntuo04r7duambcs1i0t.apps.googleusercontent.com
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.buildmeta.outputs.time }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Separate cache scope so the staging build (different NEXT_PUBLIC_* layer)
          # doesn't thrash the prod build's gha cache.
          cache-from: type=gha,scope=staging
          cache-to: type=gha,mode=max,scope=staging
