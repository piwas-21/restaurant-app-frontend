# Qodana for JS/TS — full linter (stable, non-EAP), free under
# Qodana Cloud's Community plan.
#
# Mirrors the backend adoption pattern (see
# https://github.com/piwas-21/restaurant-app-backend/blob/develop/qodana.yaml).
# Frontend issue: piwas-21/restaurant-app-frontend#29.
#
# Adoption notes:
#   - Baseline of 572 findings committed as qodana.sarif.json. New
#     PRs are graded against that baseline; only NEW problems block.
#     The bulk of the baseline (~400) is `Eslint`-prefixed findings —
#     Qodana runs its own ESLint pass with rules our local ESLint
#     config has disabled or scoped differently. We absorb them as
#     baseline rather than re-tuning two ESLint configs in tandem.
#   - Profile: `qodana.starter`. Ratchet to `qodana.recommended`
#     in a follow-up after the starter-set baseline is materially
#     smaller (mirrors the backend ratchet plan).

version: "1.0"
linter: jetbrains/qodana-js:2026.1

profile:
  name: qodana.starter

# Block on any NEW finding (anything not in the baseline). Existing
# baselined items remain reported but don't fail the build — drive
# them down over time.
failureConditions:
  severityThresholds:
    any: 0
