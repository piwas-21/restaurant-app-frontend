apiVersion: apps/v1
kind: Deployment
metadata:
  name: rumi-restaurant-web
spec:
  replicas: 2
  template:
    spec:
      containers:
      - name: rumi-restaurant-web
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 512Mi
        env:
        - name: NODE_ENV
          value: "staging"
        - name: LOG_LEVEL
          value: "debug"
