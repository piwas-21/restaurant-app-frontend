# RUMI Backend — gitleaks config
# Filename ".gitleaks.toml" is auto-discovered by gitleaks (no --config flag needed).
# Runs in GitLab CI per .gitlab-ci.yml; complements local detect-secrets pre-commit hook.
# Docs: https://github.com/gitleaks/gitleaks/blob/master/README.md

[extend]
useDefault = true

# ── Allowlist (intentional false positives) ──────────────────────────
[allowlist]
description = "Project-specific allowlist for known non-secret patterns"

# Paths that legitimately contain hashed / sample / placeholder credentials.
# Patterns are anchored on either / or \ to work across Linux (CI) and Windows.
paths = [
  # detect-secrets baseline IS a list of known false-positive hashes by design.
  # Re-scanning it with gitleaks would always fire (every entry is a hash literal).
  '''^\.secrets\.baseline$''',
  # Test fixtures + integration tests
  '''(?i)(^|/)test(s|-fixtures|fixtures)?(/|$)''',
  '''(?i)(^|/)TestFixtures(/|$)''',
  '''(?i)(^|/)RestaurantSystem\.IntegrationTests(/|$)''',
  # EF migrations sometimes embed sample seed data with placeholder hashes
  '''(?i)(^|/)RestaurantSystem\.Infrastructure/Persistence/Migrations(/|$)''',
  # Build output and dependency caches
  '''(^|/)bin(/|$)''',
  '''(^|/)obj(/|$)''',
  '''(^|/)node_modules(/|$)''',
]

# Specific commits known to contain false-positive hits
# (add via: gitleaks detect --report-path /tmp/leaks.json then commit hash)
commits = []

# Known-safe regexes for placeholder values used in dev / docs.
# These match the literal strings shipped in dev-secrets.sh / templates.
regexes = [
  # Placeholder shipped by scripts/dev-secrets.sh stub for JwtSettings.Secret.
  # Devs replace this on first setup; it's never a real secret.
  '''REPLACE_WITH_AT_LEAST_32_CHAR_SECRET''',
  '''YourSecretKeyForDevelopmentMustBeAtLeast32Characters''',
]

