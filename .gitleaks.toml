# RUMI Frontend — gitleaks config
# Filename ".gitleaks.toml" is auto-discovered by gitleaks (no --config flag needed).
# Runs in GitLab CI per .gitlab-ci.yml; complements local detect-secrets pre-commit hook.
# Docs: https://github.com/gitleaks/gitleaks/blob/master/README.md

[extend]
useDefault = true

# ── Allowlist (intentional false positives) ──────────────────────────
[allowlist]
description = "Project-specific allowlist for known non-secret patterns"

# Paths anchored on either / or \ to work across Linux (CI) and Windows.
paths = [
  # detect-secrets baseline IS a list of known false-positive hashes by design.
  '''^\.secrets\.baseline$''',
  # Test fixtures, snapshots, mocks
  '''(?i)(^|/)tests?(/|$)''',
  '''(?i)(^|/)__tests__(/|$)''',
  '''(?i)(^|/)__mocks__(/|$)''',
  '''(?i)(^|/)test-fixtures(/|$)''',
  '''(?i)(^|/)__snapshots__(/|$)''',
  # Playwright artefacts
  '''(?i)(^|/)playwright-report(/|$)''',
  '''(?i)(^|/)test-results(/|$)''',
  '''(?i)(^|/)\.playwright-mcp(/|$)''',
  # Build output, dependency caches, coverage
  '''(^|/)\.next(/|$)''',
  '''(^|/)node_modules(/|$)''',
  '''(^|/)coverage(/|$)''',
  '''(^|/)dist(/|$)''',
  '''(^|/)build(/|$)''',
]

# Specific commits known to contain false-positive hits
commits = []

# Known-safe regexes for placeholder values used in dev / docs / examples.
regexes = [
  # Public OAuth client IDs (Google) — these are NOT secrets, by design.
  # Format: \d{12}-[a-z0-9]{32}\.apps\.googleusercontent\.com
  '''[0-9]{10,12}-[a-z0-9]{32}\.apps\.googleusercontent\.com''',
  # .env.example placeholder patterns
  '''YOUR_[A-Z_]+_HERE''',
  '''REPLACE_WITH_[A-Z_]+''',
  '''PLACEHOLDER_[A-Z_]+''',
]
