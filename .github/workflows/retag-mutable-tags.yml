name: retag-mutable-tags

# Break-glass: re-point the mutable :latest GHCR tag at an already-published
# immutable build (:sha-<sha>) without rebuilding — a server-side manifest copy
# via `docker buildx imagetools create`.
#
# Use when :latest points somewhere it shouldn't (e.g. the 2026-07-10..15 window
# where {{is_default_branch}} pointed it at `develop` under GitFlow, fixed in
# build-image.yml) or to roll :latest back to a known-good release sha. The prod
# box pins FRONTEND_TAG=latest and deploy.sh does a `compose pull`, so whatever
# :latest resolves to is what production runs on its next deploy.
#
# Only :latest (the prod tag) is retagged here. :staging is intentionally left
# alone — staging tracks develop, which is the correct behaviour for that tag.
# There is no way to put a staging-baked image on :latest: build-push emits
# `sha-<40hex>` (prod-baked) and build-staging emits `staging-<40hex>` — disjoint
# namespaces — and this workflow only ever constructs `:sha-$SHA`.
#
# The real risk is pointing :latest at UNRELEASED code: build-push runs on every
# develop push, so a prod-baked `:sha-<sha>` exists for develop commits too. The
# "assert reachable from main" step below refuses any sha not on main.
#
# Security posture mirrors build-image.yml: the operator-supplied `sha` input is
# passed via env and regex-validated (never interpolated into a run: shell), the
# action is pinned to an immutable SHA, and GITHUB_TOKEN is scoped to
# packages:write (retag) + contents:read (the compare-to-main guard) only.

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Full 40-char commit SHA of the build whose :sha-<sha> image becomes :latest'
        required: true
        type: string

concurrency:
  group: retag-mutable-tags
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  retag:
    name: re-point :latest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate sha and assert it is released (reachable from main)
        # :latest is the production tag — it must only ever point at RELEASED code.
        # Guard against the real footgun: an operator pasting the develop-tip sha
        # (which is exactly the wrong value :latest may currently hold) and thereby
        # re-poisoning :latest with unreleased code — the very bug this tool exists
        # to repair. `identical` = same commit as main tip, `behind` = an ancestor
        # of main; `ahead`/`diverged` = not on main = refuse.
        env:
          SHA: ${{ inputs.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ ! "$SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::sha must be a 40-char lowercase hex commit SHA (got: '$SHA')"
            exit 1
          fi
          status="$(gh api "repos/$REPO/compare/main...$SHA" --jq .status)"
          case "$status" in
            identical|behind) echo "OK: $SHA is reachable from main ($status)" ;;
            *) echo "::error::$SHA is not on main ($status) — :latest must only point at released code"; exit 1 ;;
          esac

      - name: Re-point :latest (server-side manifest copy)
        env:
          SHA: ${{ inputs.sha }}
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Re-pointing $IMAGE:latest -> $IMAGE:sha-$SHA"
          docker buildx imagetools create --tag "$IMAGE:latest" "$IMAGE:sha-$SHA"

      - name: Verify :latest resolves to the target image (amd64 manifest)
        env:
          SHA: ${{ inputs.sha }}
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          set -euo pipefail
          # Compare the linux/amd64 child-manifest digest (what the box actually
          # runs), not the top-level index digest — imagetools reserializes the
          # index, so index digests can differ even on a correct retag.
          amd64() {
            docker buildx imagetools inspect "$1" \
              --format '{{range .Manifest.Manifests}}{{if eq .Platform.Architecture "amd64"}}{{println .Digest}}{{end}}{{end}}' \
              | head -n1
          }
          md="$(amd64 "$IMAGE:latest")"; id="$(amd64 "$IMAGE:sha-$SHA")"
          echo ":latest amd64      = $md"
          echo ":sha-$SHA amd64 = $id"
          if [[ -n "$md" && "$md" == "$id" ]]; then
            echo "OK: :latest now resolves to :sha-$SHA"
          else
            echo "::error::$IMAGE:latest amd64 digest ($md) != $IMAGE:sha-$SHA ($id)"
            exit 1
          fi
