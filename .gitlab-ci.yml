deploy_job:
  stage: deploy
  image: debian:bullseye-slim
  before_script:
    - apt update -y && apt install -y openssh-client
    - eval $(ssh-agent -s)
    - chmod 400 "$SSH_PRIVATE_KEY"
    - ssh-add "$SSH_PRIVATE_KEY"
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts
    - echo "" >> .env
    - echo "CI_PIPELINE_IID=$CI_PIPELINE_IID" >> .env
    - scp docker-compose-pro.yml .env $SERVER_USER@$SERVER_IP:/home/$SERVER_USER/

  script:
  - ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "
      docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
      docker compose --env-file .env -f docker-compose-pro.yml down &&
      docker image prune -f &&
      docker images | grep 'registry.gitlab.com/restaurant-app3282120/backend/' | grep -v \"$CI_PIPELINE_IID\" | awk '{print \$3}' | xargs -r docker rmi -f &&
      docker compose --env-file .env -f docker-compose-pro.yml pull &&
      docker compose --env-file .env -f docker-compose-pro.yml up -d --remove-orphans
    "
  when: manual




