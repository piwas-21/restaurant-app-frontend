name: deploy-staging

# Auto-deploys the FRONTEND service to the STAGING box (Netcup, staging.fooderist.com)
# after `build-image` succeeds on `develop`. This is the staging counterpart of deploy.yml
# (which auto-deploys :latest to PROD on `main`); before it existed, a develop merge only
# built the :staging image and the box had to be rolled by hand.
#
#   - auto:   after `build-image` succeeds on develop (workflow_run) -> roll frontend :staging
#   - manual: workflow_dispatch -> re-roll the current :staging (no rebuild)
#
# SCOPED to the `frontend` service on purpose: the staging box co-locates the sofra site
# (its own :latest, behind a compose profile) + postgres/redis/caddy, and a RUMI deploy must
# not recreate any of them. `.env` on the box already pins FRONTEND_TAG=staging, so pulling
# the moving :staging tag + recreating just that service is the whole deploy.
#
# NOTE: NEXT_PUBLIC_* are baked at BUILD time; the :staging image bakes the staging backend
# URL, so this only swaps the prebuilt bundle. Rolling back a bad build = fix develop (it
# re-auto-deploys) or `workflow_dispatch` on an earlier build's run.
#
# Requires repo secrets STAGING_DEPLOY_{HOST,USER,SSH_KEY,SSH_FINGERPRINT} (staging box +
# key, distinct from prod's DEPLOY_*). See docs/runbooks/DEPLOYMENT.md + the deploy repo.

on:
  workflow_run:
    workflows: ["build-image"]
    types: [completed]
    branches: [develop]
  workflow_dispatch: {}

concurrency:
  group: staging-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: deploy frontend (staging box)
    # Auto path only when the build actually succeeded; manual path always runs.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: SSH → roll frontend :staging (scoped, never touches sofra)
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.STAGING_DEPLOY_HOST }}
          username: ${{ secrets.STAGING_DEPLOY_USER }}
          key: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
          fingerprint: ${{ secrets.STAGING_DEPLOY_SSH_FINGERPRINT }}
          command_timeout: 18m
          # flock serialises against a concurrent backend staging deploy (GitHub concurrency
          # groups don't span repos). Scoped `pull frontend` + `up -d frontend` recreates only
          # the frontend (its :staging digest moved); every other service keeps running. The
          # frontend never touches app-secrets.json, so no perms step is needed here.
          script: |
            flock -n /tmp/rumi-deploy.lock -c "cd /opt/rumi/deploy && docker compose -f docker-compose.prod.yml pull frontend && docker compose -f docker-compose.prod.yml up -d frontend && docker image prune -f" \
              || { echo "::error::another RUMI deploy holds the lock; skipping this run"; exit 1; }
