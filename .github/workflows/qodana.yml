name: Qodana

# Per-PR static analysis via Qodana for JS/TS. Mirrors backend
# adoption (restaurant-app-backend#25) and tracks frontend issue #29.
#
# Adopt phase (post-spike #32 + #33):
#   - Baseline lives in-repo at qodana.sarif.json. Only NEW findings
#     beyond the baseline fail the build. `args: --baseline,...` is
#     passed via the action's args input (NOT in qodana.yaml —
#     Qodana 2026.1 rejects baseline as a config key, learned in
#     backend PR #25).
#   - The token-presence guard at the start is kept so the workflow
#     gracefully skips when QODANA_TOKEN isn't set (e.g. during a
#     token rotation gap), instead of failing the whole job.
#
# Triggers:
#   - PR against main/develop  -> diff-only PR-mode scan
#   - push to main/develop     -> full-repo scan
#   - workflow_dispatch        -> manual full-repo scan (baseline /
#                                 on-demand audits)
#
# Security posture: no untrusted-input expressions are interpolated
# into run: commands. The only ${{ ... }} interpolations are:
#   - secrets.QODANA_TOKEN (secret, safe)
#   - secrets.GITHUB_TOKEN (set by Actions automatically, safe)
#   - github.event_name (string-typed, only compared to literals)
#   - github.ref (used as a concurrency group key, not in run:)
# Third-party actions are SHA-pinned per our hardening policy.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: qodana-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  qodana:
    name: Qodana (JS/TS)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
    steps:
      # Skip the scan gracefully if the token isn't provisioned (e.g.
      # during a token rotation gap). The token-empty branch sets
      # set=false; downstream steps gate on it and the job exits clean.
      - name: Check QODANA_TOKEN
        id: token
        run: |
          if [ -z "$QODANA_TOKEN" ]; then
            echo "::warning::QODANA_TOKEN not set; skipping Qodana scan."
            echo "set=false" >> "$GITHUB_OUTPUT"
          else
            echo "set=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.token.outputs.set == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Qodana scan
        if: steps.token.outputs.set == 'true'
        uses: JetBrains/qodana-action@d7b5ec2fbec32197ef447c450e00589ed5f34fd5 # v2026.1
        with:
          upload-result: false
          use-caches: true
          post-pr-comment: ${{ github.event_name == 'pull_request' }}
          # Baseline lives in-repo at qodana.sarif.json — only NEW
          # findings beyond the baseline fail the build. Passed as
          # CLI args because `baseline` is not a qodana.yaml key.
          args: --baseline,qodana.sarif.json
