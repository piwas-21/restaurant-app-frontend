# Qodana for JS/TS — full linter (stable, non-EAP), free under
# Qodana Cloud's Community plan.
#
# Mirrors the backend adoption pattern (see
# https://github.com/piwas-21/restaurant-app-backend/blob/develop/qodana.yaml).
# Frontend issue: piwas-21/restaurant-app-frontend#29.
#
# Spike phase: keep the failure threshold lenient so we observe the
# baseline without blocking PRs. The follow-up adopt PR will:
#   - commit qodana.sarif.json as the baseline
#   - tighten failureConditions.severityThresholds.any → 0
#   - flip continue-on-error: true → false in the workflow
#   - add the noisy rules we discover here to `exclude:`

version: "1.0"
linter: jetbrains/qodana-js:2026.1

profile:
  name: qodana.starter

# Lenient threshold for the spike — we want to observe, not block.
failureConditions:
  severityThresholds:
    any: 1000
