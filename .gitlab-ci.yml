variables:
    IMAGE_NAME: $CI_REGISTRY_IMAGE
    IMAGE_TAG: $CI_PIPELINE_IID

stages:
    - cache
    - test
    - build

create_cache:
    stage: cache
    image: node:18-bullseye
    script:
        - npm install
    cache: 
        key: "$CI_COMMIT_REF_SLUG"
        paths:
            - node_modules/
        policy: push
        
npm_test:
    image: node:18-bullseye
    stage: test
    cache: 
        key: "$CI_COMMIT_REF_SLUG"
        paths:
            - node_modules/
        policy: pull
    before_script:
        - npm install
    script:    
        - npm test
    

# Static Application Security Tests (SAST)

gitleaks:
  stage: test
  image:
    name: zricethezav/gitleaks
    entrypoint: [""]
  script:
    - gitleaks detect --verbose --source .


njsscan:
  stage: test
  image: python
  before_script:
    - pip3 install --upgrade njsscan
  script:
    - njsscan --exit-warning .

semgrep:
  stage: test
  image: returntocorp/semgrep
  variables:
    SEMGREP_RULES: p/javascript
  script:
    - semgrep ci

# Software Composition Analysis (SCA) Test
# This SCA test with retire.js is used for checking vulnerabilities in 3rd party dependencies

retire:
  stage: test
  image: node:18-bullseye
  cache: 
      key: "$CI_COMMIT_REF_SLUG"
      paths:
          - node_modules/
      policy: pull
  before_script:
    - npm install -g retire 
  script:
    - retire --path .

# Docker Image building 

build_image:
    stage: build
    image: docker:24
    services:
    - docker:24-dind
    before_script:
        - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    script:
        - docker build -t $IMAGE_NAME:$IMAGE_TAG .
        - docker push $IMAGE_NAME:$IMAGE_TAG

# Docker Image Scanning

trivy:
  stage: build
  needs: ["build_image"]
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $IMAGE_NAME:$IMAGE_TAG
    - trivy image --severity HIGH,CRITICAL --exit-code 1 $IMAGE_NAME:$IMAGE_TAG
  allow_failure: true
