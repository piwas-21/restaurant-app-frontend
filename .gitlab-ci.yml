variables:
    IMAGE_NAME: $CI_REGISTRY_IMAGE
    IMAGE_TAG: $CI_PIPELINE_IID
    MS_NAME: rumi-restaurant-web
    MS_VERSION: $CI_PIPELINE_IID



stages:
    - prepare
    - test
    - build
    - deploy_pipeline

# install_deps populates a node_modules cache once per pipeline so the 5
# test-stage jobs that need it (prettier_check, typecheck, eslint,
# npm_test, npm_audit) don't each re-run `npm install`. Saves ~2-3 min
# per pipeline once the cache is warm. Cache key is package-lock.json
# so it stays valid across pipelines until a dependency change.
install_deps:
    stage: prepare
    image: node:22-alpine
    cache:
        key:
            files:
                - package-lock.json
        paths:
            - node_modules/
        policy: pull-push
    script:
        - npm ci --prefer-offline --no-audit

# Reusable template: jobs that need node_modules pull the cache and skip
# their own `npm install` if the cache hit. On a cache miss (rare —
# typically only after a dependency change before install_deps caught up),
# fall back to `npm ci` so the job is still self-sufficient.
.use_npm_cache:
    cache:
        key:
            files:
                - package-lock.json
        paths:
            - node_modules/
        policy: pull
    before_script:
        - test -d node_modules || npm ci --prefer-offline --no-audit

# Sprint 2 quality gate: prettier --check.
# Fails the pipeline if any tracked source file has formatting drift.
# Fix: `npm run format` locally and re-push.
prettier_check:
    extends: .use_npm_cache
    image: node:22-alpine
    stage: test
    script:
        - npm run format:check

# Sprint 2.5 quality gate: tsc --noEmit.
# Whole-project type-check; catches cross-file type breakage.
typecheck:
    extends: .use_npm_cache
    image: node:22-alpine
    stage: test
    script:
        - npm run typecheck

# Sprint 2.5 quality gate: eslint --max-warnings=0.
# Fails the pipeline on any lint warning.
eslint:
    extends: .use_npm_cache
    image: node:22-alpine
    stage: test
    script:
        - npm run lint

# Sprint 2 quality gate: file-length check.
# Enforces the per-file LOC limits from CLAUDE.md §4. Existing oversized
# files are grandfathered via scripts/file-length-baseline.txt; new
# violations block. Pure bash — no Node SDK needed.
file_length:
    image: bash:5
    stage: test
    script:
        - bash scripts/check-file-length.sh --all

npm_test:
    extends: .use_npm_cache
    image: node:22-alpine
    stage: test
    script:
        - npm test

npm_audit:
    extends: .use_npm_cache
    image: node:22-alpine
    stage: test
    script:
        - npm audit --audit-level=high
        - npm audit --json > audit-report.json || true
    artifacts:
        reports:
            dependency_scanning: audit-report.json
        paths:
            - audit-report.json
        expire_in: 30 days
    allow_failure: false  # Block pipeline on high/critical vulnerabilities


# Static Application Security Tests (SAST)

gitleaks:
  stage: test
  image:
    name: zricethezav/gitleaks
    entrypoint: [""]
  script:
    - gitleaks detect --verbose --source .


njsscan:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip3 install --upgrade njsscan
  script:
    - njsscan --exit-warning .

semgrep:
  stage: test
  image: returntocorp/semgrep
  variables:
    SEMGREP_RULES: p/javascript
  script:
    - semgrep ci

# Software Composition Analysis (SCA) Test
# This SCA test with retire.js is used for checking vulnerabilities in 3rd party dependencies

retire:
  stage: test
  image: node:22-alpine
  # cache:
  #     key: "$CI_COMMIT_REF_SLUG"
  #     paths:
  #         - node_modules/
  #     policy: pull
  before_script:
    - npm install -g retire
  script:
    - retire --path .

# Docker Image building
#
# build_image + trivy run only on push to develop or main — not on every
# MR pipeline. The image is the deploy artefact; rebuilding + scanning it
# for every WIP commit on a feature branch burns shared-runner minutes
# for no deploy benefit (MR-tagged images are never pulled by ArgoCD).
# The test stage above (prettier_check / typecheck / eslint / npm_test /
# npm_audit / gitleaks / semgrep / njsscan / retire / file_length) still
# runs on every MR pipeline; what we skip is the Dockerfile build and
# image scan.

build_image:
    stage: build
    rules:
        - if: $CI_COMMIT_BRANCH == "develop"
        - if: $CI_COMMIT_BRANCH == "main"
    image: docker:24
    # No `services: docker:24-dind`: the self-hosted laptop runner mounts
    # the host's docker.sock so the docker CLI inside this container talks
    # directly to Docker Desktop's daemon. DinD-as-a-service doesn't work
    # reliably under Docker Desktop on macOS. When/if we migrate to a Linux
    # VM runner, we can flip back to DinD; the change is trivial to revert.
    before_script:
        - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    script:
        - >
          docker build
          --build-arg NEXT_PUBLIC_API_URL=https://www.rumirestaurant.ch
          --build-arg NEXT_PUBLIC_IMAGE_BASE_URL=https://rumi-test-backend-bucket.s3.eu-central-1.amazonaws.com
          --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=102252528656-3quqh29v8b7psntuo04r7duambcs1i0t.apps.googleusercontent.com
          -t $IMAGE_NAME:$IMAGE_TAG .
        - docker push $IMAGE_NAME:$IMAGE_TAG

trigger_deploy_pipeline:
  stage: deploy_pipeline
  # Only fire from the deployment-tracking branches. From a feature branch,
  # the downstream argocd-gitops pipeline rejects the trigger (permissions /
  # branch validation), failing CI without surfacing actionable signal.
  # `develop` is currently the production-tracking branch; `main` will take
  # over after the planned cutover.
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"
  variables:
    MS_NAME: "rumi-restaurant-web"
    MS_VERSION: "$CI_PIPELINE_IID"
  trigger:
    project: restaurant-app3282120/rumi-argocd-gitops
    branch: main
    strategy: depend

# Docker Image Scanning

trivy:
  stage: build
  needs: ["build_image"]
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"
  image: docker:24
  # Same socket-mount rationale as build_image — see note there.
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $IMAGE_NAME:$IMAGE_TAG
    - trivy image --severity HIGH,CRITICAL --ignorefile .trivyignore --exit-code 1 $IMAGE_NAME:$IMAGE_TAG
  # Trivy is blocking as of 2026-04-29: image hardened in commit 5236dd5
  # (Node 22-alpine + npm CLI removed from runner) brought HIGH/CRITICAL
  # CVEs to zero. New CVEs will block — fix the underlying package, bump
  # the base image, or add a CVE-specific entry to .trivyignore with
  # written justification.
