apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: rumi-restaurant-web

resources:
- configmap.yaml
- deployment.yaml
- service.yaml
- ingress.yaml
- hpa.yaml

images:
- name: rumi-restaurant-web
  newTag: latest

commonLabels:
  app: rumi-restaurant-web
  environment: production

namespace: default

replicas:
- name: rumi-restaurant-web
  count: 3

# Patches for different environments
patchesStrategicMerge: []

# Configuration transformers
configMapGenerator: []

# Secret generators (use for sensitive data)
secretGenerator: []
