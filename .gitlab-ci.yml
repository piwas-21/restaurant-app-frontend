variables:
    IMAGE_NAME: $CI_REGISTRY_IMAGE
    IMAGE_TAG: $CI_PIPELINE_IID
    MS_NAME: rumi-restaurant-backend
    MS_VERSION: $CI_PIPELINE_IID

stages:
- test
- build
# - deploy_pipeline

# gitleaks is detecting hardcoded secrets in app source code

# Sprint 2 quality gate: `dotnet format --verify-no-changes`.
# Fails the pipeline if any file in the solution has formatting drift.
# Fix: run `dotnet format RestaurantSystem.sln` locally and re-push.
dotnet_format:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - dotnet format RestaurantSystem.sln --verify-no-changes --verbosity minimal

# Sprint 2 quality gate: file-length check.
# Enforces the per-file LOC limits from CLAUDE.md §4. Existing oversized
# files are grandfathered via scripts/file-length-baseline.txt; new
# violations block. Pure bash — no .NET SDK needed.
file_length:
  stage: test
  image: bash:5
  script:
    - bash scripts/check-file-length.sh --all

# Sprint 3 quality gate: TreatWarningsAsErrors via Directory.Build.props.
# Build must complete with zero errors and zero non-excluded warnings.
# Excluded warning categories live in Directory.Build.props.
dotnet_build_strict:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - dotnet build RestaurantSystem.sln --nologo --verbosity minimal

# Sprint 3 quality gate: integration test suite.
# DatabaseFixture spins up Postgres via Testcontainers — needs Docker
# access at runtime. We expose Docker via the dind service; Testcontainers
# .NET talks to the API via DOCKER_HOST (no docker CLI install needed).
dotnet_test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:10.0
  # Postgres-as-service instead of dind+Testcontainers. We tried four
  # variants of the dind setup; the gitlab.com docker+machine executor
  # made dind reachable for curl probes but unreachable for the dotnet
  # test process within the same shell. DatabaseFixture honours the
  # INTEGRATION_TESTS_DB_CONNECTION env var when set and bypasses
  # Testcontainers; locally the var is unset and Testcontainers still
  # spins up its own Postgres for fast iteration.
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_DB: restaurant_test
    POSTGRES_USER: test
    POSTGRES_PASSWORD: test
    INTEGRATION_TESTS_DB_CONNECTION: "Host=postgres;Port=5432;Database=restaurant_test;Username=test;Password=test"
  script:
    - dotnet test RestaurantSystem.IntegrationTests/RestaurantSystem.IntegrationTests.csproj
      --nologo --verbosity minimal
      --logger "junit;LogFileName=test-results.xml"
      --results-directory $CI_PROJECT_DIR/test-results
      -p:CollectCoverage=true
      -p:CoverletOutputFormat=cobertura
      -p:CoverletOutput=$CI_PROJECT_DIR/test-results/coverage.cobertura.xml
      -p:Exclude='[*]*.Migrations.*'
      -p:Threshold=17%2c9%2c15
      -p:ThresholdType=line%2cbranch%2cmethod
      -p:ThresholdStat=total
  coverage: '/^\|\s+Total\s+\|\s+(\d+(?:\.\d+)?)%/'
  artifacts:
    when: always
    reports:
      junit: test-results/*.xml
      coverage_report:
        coverage_format: cobertura
        path: test-results/coverage.cobertura.xml
    paths:
      - test-results/
    expire_in: 1 week

gitleaks:
  stage: test
  image:
    name: zricethezav/gitleaks
    entrypoint: [""]
  script:
    - gitleaks detect --verbose --source .


# Static Application Security Test (SAST)
# In this job, GitLab's template job is used

sast:
  stage: test

include:
  - template: Jobs/SAST.gitlab-ci.yml


# Docker Image building

build_image:
    stage: build
    image: docker:24
    services:
    - docker:24-dind
    before_script:
        - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    script:
        - docker build -t $IMAGE_NAME:$IMAGE_TAG .
        - docker push $IMAGE_NAME:$IMAGE_TAG

# Docker Image Scanning for security vulnerabilities and misconfigurations
# Trivy tool is used

trivy:
  stage: build
  needs: ["build_image"]
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $IMAGE_NAME:$IMAGE_TAG
    - trivy image -f json -o trivy.json --severity HIGH,CRITICAL --exit-code 1 $IMAGE_NAME:$IMAGE_TAG
  allow_failure: true
  artifacts:
    when: always
    paths:
      - trivy.json

