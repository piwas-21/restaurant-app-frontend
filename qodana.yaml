# Qodana for JS/TS — full linter (stable, non-EAP), free under
# Qodana Cloud's Community plan.
#
# Mirrors the backend adoption pattern (see
# https://github.com/piwas-21/restaurant-app-backend/blob/develop/qodana.yaml).
# Frontend issue: piwas-21/restaurant-app-frontend#29.
#
# Adoption notes:
#   - Baseline of 572 findings committed as qodana.sarif.json. New
#     PRs are graded against that baseline; only NEW problems block.
#     The bulk of the baseline (~400) is `Eslint`-prefixed findings —
#     Qodana runs its own ESLint pass with rules our local ESLint
#     config has disabled or scoped differently. We absorb them as
#     baseline rather than re-tuning two ESLint configs in tandem.
#   - Profile: `qodana.starter`. Ratchet to `qodana.recommended`
#     in a follow-up after the starter-set baseline is materially
#     smaller (mirrors the backend ratchet plan).

version: '1.0'
linter: jetbrains/qodana-js:2026.1

profile:
  name: qodana.starter

# Path-scoped exclusions for known false positives.
#
# `HardcodedPasswords` fires on the connection-string examples in
# `e2e/helpers/db.ts` (Error message hinting at the DSN format) and
# `scripts/dev-e2e.sh` (comment with the dev-compose default). Both
# are documentation strings, already annotated with
# `pragma: allowlist secret` for our other secret scanners (gitleaks,
# detect-secrets); Qodana doesn't honour those pragmas, so we
# path-scope here. We ALSO exclude the rule on `qodana.sarif.json`
# itself — without that, Qodana scans its own baseline file (which
# embeds the password-URL snippets describing the original findings)
# and produces NEW HardcodedPasswords findings against the baseline,
# blocking every PR.
exclude:
  - name: HardcodedPasswords
    paths:
      - e2e/helpers/db.ts
      - scripts/dev-e2e.sh
      - qodana.sarif.json

  # Qodana runs its own ESLint integration that walks the whole tree.
  # Local `next lint` defaults to src/pages/app and skips e2e/; Qodana
  # doesn't know that. When new e2e files land (cashierUser fixture,
  # cashier order-flow spec, etc.), Qodana reports "ESLint: Install
  # the 'eslint' package" because no flat-config block matches them.
  # The e2e tree is tsc-typed and Playwright-checked; we don't need a
  # second linter pass on it. eslint.config.mjs also has matching
  # `ignores: ["e2e/**", ...]` so the two surfaces stay in lockstep.
  #
  # The same "Install the 'eslint' package" error fires on top-level
  # `src/lib/*.ts` and any `src/types/*.d.ts` file — Qodana's bundled
  # ESLint can't resolve a flat-config block for them even though
  # local `npx eslint <file>` runs clean. Excluded with the same
  # rationale: src/lib + src/types are tsc-typed; the local lint gate
  # (`npm run lint`) covers them on commit.
  - name: Eslint
    paths:
      - e2e
      - src/lib
      - src/types
      # Same Qodana flat-config gap as src/lib + src/types — bundled
      # ESLint can't resolve a config block for nested hook subdirs
      # (added 2026-05-27 when useServerOrders was split into
      # src/hooks/serverOrders/*). Local `npm run lint` covers it.
      - src/hooks/serverOrders
      # Same Qodana flat-config gap — added 2026-05-27 when usePublicMenu was
      # split into src/hooks/publicMenu/* (PR #66). Local `npm run lint`
      # covers it.
      - src/hooks/publicMenu
      # Same Qodana flat-config gap — added 2026-05-27 when
      # duplicateEmailDetection.ts landed in PR #70 (new src/hooks/order/
      # subdir for the inline-registration duplicate-email helpers).
      # Local `npm run lint` covers it.
      - src/hooks/order

# Block on any NEW finding (anything not in the baseline). Existing
# baselined items remain reported but don't fail the build — drive
# them down over time.
failureConditions:
  severityThresholds:
    any: 0
