name: build-tenant-image

# Builds a PER-TENANT frontend image for Sofra instance-per-tenant provisioning
# (sofra ADR-001/ADR-003; deploy repo provision-tenant.sh pulls the result).
#
# WHY a separate image per tenant: NEXT_PUBLIC_* are baked into the bundle at
# BUILD time (Next.js), so each tenant domain needs its own bake of the SAME
# source — this is the staging-image pattern (build-image.yml build-staging)
# generalised to an on-demand workflow_dispatch. The prod :latest chain is
# untouched; this is deliberately a SEPARATE workflow file so deploy.yml's
# workflow_run trigger (which matches build-image by name) never fires from a
# tenant build.
#
# Usage (founder-run today; the control plane calls the same entry point later):
#   gh workflow run build-tenant-image.yml -f tenant_domain=demo.sofrapiwas.com -f image_tag=tenant-demo
# Publishes ghcr.io/piwas-21/restaurant-app-frontend:<image_tag> (moving) plus
# :<image_tag>-sha-<commit> (immutable, for rollback), built from the ref the
# workflow is dispatched on (normally main).
#
# Security: same posture as build-image.yml — no untrusted-input expressions in
# any run: step (inputs appear only in `with:` blocks; dispatch is restricted to
# users with write access anyway); all third-party actions pinned to immutable
# SHAs; token is the workflow-scoped GITHUB_TOKEN with packages:write only.

on:
  workflow_dispatch:
    inputs:
      tenant_domain:
        description: "Tenant's public domain (no scheme), e.g. demo.sofrapiwas.com"
        required: true
      image_tag:
        description: "GHCR tag to publish, e.g. tenant-demo (convention: tenant-<registry slug>)"
        required: true
      google_client_id:
        description: "Google OAuth web client id for this tenant ('' disables Google login; the shared client only allows registered JS origins)"
        required: false
        default: ""
      restaurant_name:
        description: "Tenant display name baked into page metadata (registry `name`, e.g. Demo Restaurant). Empty = neutral 'Restaurant' title — pass it for any real tenant"
        required: false
        default: ""

concurrency:
  group: build-tenant-${{ inputs.image_tag }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: build & push tenant image (GHCR)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: buildmeta
        # ISO-8601 UTC build timestamp, baked into the image alongside the commit
        # SHA. No workflow inputs are referenced here (see security note above).
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=sha,format=long,prefix=${{ inputs.image_tag }}-

      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ inputs.tenant_domain }}
            NEXT_PUBLIC_IMAGE_BASE_URL=https://${{ inputs.tenant_domain }}
            NEXT_PUBLIC_RESTAURANT_NAME=${{ inputs.restaurant_name }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ inputs.google_client_id }}
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.buildmeta.outputs.time }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
