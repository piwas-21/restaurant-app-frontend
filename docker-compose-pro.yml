services:
  restaurantsystem-api:
    image: ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_IID}
    container_name: restaurant-api-dev
    ports:
      - "5221:8080"
      - "7000:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=restaurantdb;Username=postgres;Password=postgres123
      - Redis__Host=redis
      - Redis__Port=6379
    volumes:
      - /app/app-secrets.json:/app/app-secrets.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - restaurant-network-dev

  redis:
    image: redis:alpine
    container_name: restaurant-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - restaurant-network-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: restaurant-postgres-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=restaurantdb
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - restaurant-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  restaurant-network-dev:
    driver: bridge

volumes:
  postgres_data_dev:
  redis_data:
