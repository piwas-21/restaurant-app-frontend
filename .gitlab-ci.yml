variables:
    IMAGE_NAME: $CI_REGISTRY_IMAGE
    IMAGE_TAG: $CI_PIPELINE_IID
    MS_NAME: rumi-restaurant-web
    MS_VERSION: $CI_PIPELINE_IID



stages:
