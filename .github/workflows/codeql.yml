name: CodeQL

# Replaces the GitLab SAST template (javascript-typescript analyzer).
# Runs on PRs to protected branches and weekly to catch newly-disclosed
# vulnerabilities in unchanged code.
#
# Security: only static `languages:` input — no untrusted expressions.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
