name: build-tenant-image

# Builds a PER-TENANT frontend image for Sofra instance-per-tenant provisioning
# (sofra ADR-001/ADR-003; deploy repo provision-tenant.sh pulls the result).
#
# WHY a separate image per tenant: NEXT_PUBLIC_* are baked into the bundle at
# BUILD time (Next.js), so each tenant domain needs its own bake of the SAME
# source — this is the staging-image pattern (build-image.yml build-staging)
# generalised to an on-demand workflow_dispatch. The prod :latest chain is
# untouched; this is deliberately a SEPARATE workflow file so deploy.yml's
# workflow_run trigger (which matches build-image by name) never fires from a
# tenant build.
#
# Usage (founder-run today; the control plane calls the same entry point later):
#   gh workflow run build-tenant-image.yml -f tenant_domain=demo.sofrapiwas.com -f image_tag=tenant-demo
# Publishes ghcr.io/piwas-21/restaurant-app-frontend:<image_tag> (moving) plus
# :<image_tag>-sha-<commit> (immutable, for rollback), built from the ref the
# workflow is dispatched on (normally main).
#
# Security: same posture as build-image.yml — no untrusted-input expressions
# inlined in any run: step (inputs appear in `with:` blocks, or — for
# branding_url only — are passed via `env:` into the script and validated;
# dispatch is restricted to users with write access anyway); all third-party
# actions pinned to immutable SHAs; token is the workflow-scoped GITHUB_TOKEN
# with packages:write only.

on:
  workflow_dispatch:
    inputs:
      tenant_domain:
        description: "Tenant's public domain (no scheme), e.g. demo.sofrapiwas.com"
        required: true
      image_tag:
        description: "GHCR tag to publish, e.g. tenant-demo (convention: tenant-<registry slug>)"
        required: true
      google_client_id:
        description: "Google OAuth web client id for this tenant ('' disables Google login; the shared client only allows registered JS origins)"
        required: false
        default: ""
      restaurant_name:
        description: "Tenant display name baked into page metadata (registry `name`, e.g. Demo Restaurant). Empty = neutral 'Restaurant' title — pass it for any real tenant"
        required: false
        default: ""
      branding_url:
        description: "HTTPS URL of a .tar.gz branding archive extracted into public/branding/ before the build (files at archive root: logo.png, logo-dark.png, icon.svg, hero.png, placeholder.png). Empty = repo default assets"
        required: false
        default: ""
      branding_dir:
        description: "Repo-relative dir of committed branding assets (same filenames as branding_url) copied into public/branding/ before the build. Alternative to branding_url (no download); empty = none"
        required: false
        default: ""
      template:
        description: "UI template baked into the bundle (registry `template:` field, ADR-006): classic | craft"
        required: false
        default: "classic"
      currency:
        description: "ISO 4217 currency code baked into price formatting (registry `currency:` field, deploy repo; pairs with backend LocalizationSettings.Currency), e.g. CHF, EUR"
        required: false
        default: "CHF"
  # Reusable entry point (same inputs, typed) so an automated caller can rebuild a
  # tenant image from the caller's ref without duplicating the build logic — used by
  # build-demo-tenant.yml to rebuild tenant-demo from develop-tip on every develop push
  # (demo.sofrapiwas.com = craft staging). GITHUB_TOKEN reaches same-repo reusable
  # workflows automatically; the caller must grant packages:write.
  workflow_call:
    inputs:
      tenant_domain:
        description: "Tenant's public domain (no scheme), e.g. demo.sofrapiwas.com"
        required: true
        type: string
      image_tag:
        description: "GHCR tag to publish, e.g. tenant-demo"
        required: true
        type: string
      google_client_id:
        description: "Google OAuth web client id ('' disables Google login)"
        required: false
        default: ""
        type: string
      restaurant_name:
        description: "Tenant display name baked into page metadata"
        required: false
        default: ""
        type: string
      branding_url:
        description: "HTTPS URL of a .tar.gz branding archive (empty = repo defaults)"
        required: false
        default: ""
        type: string
      branding_dir:
        description: "Repo-relative dir of committed branding assets copied into public/branding/ (alternative to branding_url; empty = none)"
        required: false
        default: ""
        type: string
      template:
        description: "UI template baked into the bundle: classic | craft"
        required: false
        default: "classic"
        type: string
      currency:
        description: "ISO 4217 currency code, e.g. CHF, EUR"
        required: false
        default: "CHF"
        type: string

concurrency:
  group: build-tenant-${{ inputs.image_tag }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: build & push tenant image (GHCR)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate template input
        # Allowlist mirrors the registry contract (deploy repo registry.yml
        # `template:` values, ADR-006). NOTE: `craft` is accepted here per
        # that contract but FAILS the Docker build until T3 ships
        # src/templates/craft/ (next.config.ts aborts on a missing template
        # dir). Input is operator-supplied (workflow_dispatch, write access
        # required); still passed via env, never inlined in the script.
        env:
          TEMPLATE: ${{ inputs.template }}
        run: |
          case "$TEMPLATE" in
            classic|craft) ;;
            *) echo "template must be 'classic' or 'craft', got: '$TEMPLATE'" >&2; exit 1 ;;
          esac

      - name: Validate currency input
        # Mirrors the src/lib/config.ts validation (3-letter uppercase ISO
        # 4217 code). An invalid code would silently fall back to CHF inside
        # the bundle, so fail the build loudly here instead. Input is
        # operator-supplied (workflow_dispatch, write access required); still
        # passed via env, never inlined in the script.
        env:
          CURRENCY: ${{ inputs.currency }}
        run: |
          if ! printf '%s\n' "$CURRENCY" | grep -Eq '^[A-Z]{3}$'; then
            echo "currency must be a 3-letter uppercase ISO 4217 code, got: '$CURRENCY'" >&2
            exit 1
          fi

      - name: Apply tenant branding overrides
        # Replaces the repo-default branding assets in public/branding/ with
        # the tenant's own set BEFORE the Docker build, so a tenant image
        # carries its own logo/hero/favicon without a repo change (#125).
        # Expected archive layout (.tar.gz, files at the archive ROOT):
        #   logo.png        — light-theme logo
        #   logo-dark.png   — dark-theme logo
        #   icon.svg        — favicon
        #   hero.png        — home-page hero background
        #   placeholder.png — menu-item "no photo" fallback
        # Only these filenames are copied (no arbitrary extraction into the
        # workspace); a file missing from the archive keeps the repo default.
        # The repo defaults are still tenant-1 (RUMI) assets; a tenant overrides
        # any of them via branding_url OR a committed branding_dir (the Sofra
        # demo uses public/branding-sofra/ — see build-demo-tenant.yml).
        # Security: input is operator-supplied (workflow_dispatch, write
        # access required); still passed via env — never inlined in the
        # script — quoted, and required to start with https://.
        if: inputs.branding_url != ''
        env:
          BRANDING_URL: ${{ inputs.branding_url }}
        run: |
          set -euo pipefail
          case "$BRANDING_URL" in
            https://*) ;;
            *) echo "branding_url must start with https://" >&2; exit 1 ;;
          esac
          tmp="$(mktemp -d)"
          curl --fail --silent --show-error --location --max-time 60 \
            --output "$tmp/branding.tar.gz" "$BRANDING_URL"
          tar -xzf "$tmp/branding.tar.gz" -C "$tmp"
          applied=0
          for f in logo.png logo-dark.png icon.svg hero.png placeholder.png; do
            if [ -f "$tmp/$f" ]; then
              cp "$tmp/$f" "public/branding/$f"
              echo "branding override applied: $f"
              applied=1
            fi
          done
          if [ "$applied" -eq 0 ]; then
            echo "branding archive contained none of logo.png/logo-dark.png/icon.svg/hero.png/placeholder.png" >&2
            exit 1
          fi

      - name: Apply committed branding dir
        # Alternative to branding_url for assets ALREADY committed in this repo
        # (e.g. the Sofra demo set at public/branding-sofra/) — copies the same
        # filenames into public/branding/ before the Docker build, no download.
        # Security: the path is operator/caller-supplied → passed via env, quoted,
        # and rejected if absolute or containing '..' (no escape from the repo).
        if: inputs.branding_dir != ''
        env:
          BRANDING_DIR: ${{ inputs.branding_dir }}
        run: |
          set -euo pipefail
          case "$BRANDING_DIR" in
            /* | *..*) echo "branding_dir must be a repo-relative path without '..'" >&2; exit 1 ;;
          esac
          [ -d "$BRANDING_DIR" ] || { echo "branding_dir not found: $BRANDING_DIR" >&2; exit 1; }
          applied=0
          for f in logo.png logo-dark.png icon.svg hero.png placeholder.png; do
            if [ -f "$BRANDING_DIR/$f" ]; then
              cp "$BRANDING_DIR/$f" "public/branding/$f"
              echo "branding override applied: $f"
              applied=1
            fi
          done
          if [ "$applied" -eq 0 ]; then
            echo "branding_dir $BRANDING_DIR contained none of the expected filenames" >&2
            exit 1
          fi

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: buildmeta
        # ISO-8601 UTC build timestamp, baked into the image alongside the commit
        # SHA. No workflow inputs are referenced here (see security note above).
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=sha,format=long,prefix=${{ inputs.image_tag }}-

      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ inputs.tenant_domain }}
            NEXT_PUBLIC_IMAGE_BASE_URL=https://${{ inputs.tenant_domain }}
            NEXT_PUBLIC_RESTAURANT_NAME=${{ inputs.restaurant_name }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ inputs.google_client_id }}
            NEXT_PUBLIC_TEMPLATE=${{ inputs.template }}
            NEXT_PUBLIC_TENANT_CURRENCY=${{ inputs.currency }}
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.buildmeta.outputs.time }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
