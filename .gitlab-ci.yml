stages:
    - cache
    - test
    # - build

create_cache:
    stage: cache
    image: node:18-bullseye
    script:
        - yarn install
    cache: 
        key: 
            files:
                - yarn.lock
        paths:
            - node_modules/
            - yarn.lock
            - .yarn
        policy: pull-push
        
yarn_test:
    image: node:18-bullseye
    stage: test
    script:
        - yarn install
        - yarn test
    cache: 
        key: 
            files:
                - yarn.lock
        paths:
            - node_modules/
            - yarn.lock
            - .yarn
        policy: pull

